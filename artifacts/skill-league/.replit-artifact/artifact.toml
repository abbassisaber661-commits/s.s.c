kind = "web"
previewPath = "/"
title = "SkillLeague"
version = "1.0.0"
id = "artifacts/skill-league"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23640

[services.development]
run = "pnpm --filter @workspace/skill-league run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/skill-league", "run", "build" ]
publicDir = "artifacts/skill-league/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23640"
BASE_PATH = "/"
